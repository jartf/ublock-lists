name: Mirror filter lists

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Run mirror script
        run: python mirror.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mirror/
          git diff --cached --quiet || git commit -m "mirror filter lists on $(date -u +%Y-%m-%d)"
          git push
