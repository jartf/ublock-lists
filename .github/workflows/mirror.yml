name: Mirror filter lists

concurrency:
  group: push-to-main
  cancel-in-progress: false

on:
  schedule:
    - cron: "0 2 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run mirror script
        run: python3 scripts/mirror.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mirror/
          git diff --staged --quiet || git commit -m "mirror filter lists on $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
