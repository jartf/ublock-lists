name: Compile filter list

concurrency:
  group: push-to-main
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 3 * * 1'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
      	uses: actions/checkout@v4

      - name: Fetch and compile
        run: python3 scripts/compile.py

      - name: Commit compiled list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add personal.txt
          git diff --staged --quiet || git commit -m "recompile personal filter list"
          git pull --rebase origin main
          git push
